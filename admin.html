<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CR Election — Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="antialiased min-h-screen pb-12 bg-black text-white selection:bg-teal-500 selection:text-white">
  
  <!-- Header -->
  <header class="bg-gradient-to-r from-slate-900 to-navy border-b border-slate-800 py-6 mb-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="text-2xl font-bold tracking-tight text-white">Election Administration</h1>
      <p class="text-slate-400 text-sm mt-1">Manage Candidates & Input Manual Ballots</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 space-y-8">
    <div class="bg-navy/90 rounded-2xl p-6 shadow-2xl border border-slate-700 min-h-[480px]">
      
      <!-- Top Control Bar -->
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-700/50 pb-6">
        <div>
          <h2 class="text-xl font-bold text-white mb-1">Voting &amp; Candidate Controls</h2>
          <span id="voteStatusAdmin" class="text-[11px] px-2.5 py-1 rounded bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 font-bold uppercase tracking-widest">Voting Open</span>
        </div>
        
        <div class="text-right space-y-3 w-full md:w-auto">
          <div>
            <div class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Total Valid Ballots</div>
            <div id="voteCountHeader" class="text-2xl font-black text-teal-400">0 / 58</div>
          </div>
          
          <div class="flex items-center justify-end gap-3">
            <button id="toggleVotingBtn" onclick="toggleVotingClosed()" class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider bg-orange-600 text-white hover:bg-orange-500 transition-colors shadow-lg">
              End Votes Early
            </button>
            <!-- NEW: Danger Reset Button -->
            <button onclick="resetElection()" class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider bg-red-950/50 text-red-400 border border-red-500/50 hover:bg-red-900/60 hover:text-white transition-all shadow-lg">
              Reset Election
            </button>
          </div>
        </div>
      </div>

      <!-- Main Admin Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- Manual Ballot Entry -->
        <div class="bg-slate-800/40 p-6 rounded-xl border border-blue-500/20 shadow-inner">
          <h3 class="text-sm font-bold uppercase tracking-widest text-blue-400 mb-5 border-b border-slate-700 pb-2">Manual Ballot Entry</h3>
          
          <div class="space-y-6">
            <div>
              <h4 class="text-xs font-semibold text-slate-300 mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span> Rank B1 Candidates
              </h4>
              <div id="ballotFormB1" class="space-y-3"></div>
            </div>
            
            <div>
              <h4 class="text-xs font-semibold text-slate-300 mb-3 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-teal-500"></span> Rank B2 Candidates
              </h4>
              <div id="ballotFormB2" class="space-y-3"></div>
            </div>
          </div>

          <button onclick="requestVoteConfirmation()" id="submitVoteBtn" class="mt-8 w-full bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-white font-bold tracking-wider uppercase px-4 py-4 rounded-xl shadow-lg transition-transform transform hover:scale-[1.02]">
            Review &amp; Submit Ballot
          </button>
        </div>

        <!-- Candidate Management -->
        <div class="bg-slate-800/40 p-6 rounded-xl border border-teal-500/20 shadow-inner flex flex-col max-h-[700px]">
          <div class="flex justify-between items-center mb-5 border-b border-slate-700 pb-2">
            <h3 class="text-sm font-bold uppercase tracking-widest text-teal-400">Candidate Roster</h3>
            <button onclick="openAddCandidateModal()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded shadow transition-colors">
              + Add New
            </button>
          </div>
          <div id="candidateList" class="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar"></div>
        </div>

      </div>
    </div>
  </main>

  <script src="assets/main.js"></script>
  <script>adminInit();</script>
</body>
</html>
