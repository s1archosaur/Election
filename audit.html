<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CR Election — Public Audit Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="icon" type="image/x-icon" href="/images/Chic.png">
  <style>
    .screen { max-width: 100vw; max-height: 100dvh; }
  </style>
</head>
<body class="bg-black text-white">
  <div class="viewport-16by9 flex items-center justify-center w-screen h-[100dvh] relative">
    <div id="screen" class="screen bg-navy/90 rounded-lg overflow-hidden shadow-2xl w-full max-w-[1600px] flex flex-col">
      
      <div class="flex-none px-5 py-4 bg-gradient-to-r from-slate-900/80 to-navy/80 flex items-center justify-between gap-3 border-b border-slate-700/50 shadow-md">
        <div>
          <h1 class="text-xl lg:text-2xl font-bold leading-tight flex items-center gap-3">
            <span class="w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_10px_#34d399]"></span>
            Cryptographic Audit Log
          </h1>
          <p class="text-xs lg:text-sm text-slate-400 mt-1">Immutable public record of all cast ballots for verification.</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right border-r border-slate-700 pr-5">
            <div class="text-xs text-slate-400 uppercase tracking-widest font-semibold mb-1">Total Verified Records</div>
            <div id="auditTotal" class="text-xl font-black text-teal-400">0</div>
          </div>
          <a href="spectator.html" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-sm font-semibold rounded-lg transition-colors">
            ← Back to Dashboard
          </a>
        </div>
      </div>

      <div class="flex-1 p-5 overflow-hidden flex flex-col min-h-0">
        <div class="bg-slate-900/50 rounded-2xl border border-slate-700/50 flex flex-col min-h-0 shadow-lg flex-1 overflow-hidden">
          
          <div class="grid grid-cols-12 gap-4 px-6 py-4 bg-slate-800/80 border-b border-slate-700 text-xs font-bold uppercase tracking-widest text-slate-400">
            <div class="col-span-1">Voter ID</div>
            <div class="col-span-5 text-blue-300">B1 Ranked Preferences</div>
            <div class="col-span-6 text-teal-300">B2 Ranked Preferences</div>
          </div>

          <div id="auditTableBody" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            </div>
          
        </div>
      </div>

    </div>
  </div>

  <script src="assets/main.js"></script>
  <script>auditInit();</script>
</body>
</html>
