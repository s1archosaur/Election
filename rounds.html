<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CR Election — RCV Calculation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="icon" type="image/png" href="/images/Chic.png">
  <style>
    .screen { max-width: 100vw; max-height: 100dvh; }
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-round { opacity: 0; animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) translateX(-50%); }
      100% { opacity: 1; transform: scale(1) translateX(-50%); }
    }
    .animate-reveal-btn { opacity: 0; transform-origin: bottom center; animation: popIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-black text-white">
  <div class="viewport-16by9 flex items-center justify-center w-screen h-[100dvh] relative">
    <!-- FIX: Flex flex-col ensures no top cropping -->
    <div id="screen" class="screen bg-navy/90 rounded-lg overflow-hidden shadow-2xl w-full max-w-[1600px] flex flex-col">
      
      <!-- Top Bar (Flex-none) -->
      <div class="flex-none px-5 py-4 bg-gradient-to-r from-slate-900/80 to-navy/80 flex items-center justify-between border-b border-slate-700/50 shadow-md">
        <div>
          <h1 class="text-xl lg:text-2xl font-bold leading-tight flex items-center gap-3">
            <span class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_cyan]"></span>
            Automated Rank Choice Calculation Engine
          </h1>
          <p class="text-xs lg:text-sm text-slate-400 mt-1">Simulating vote redistributions based on secondary preferences</p>
        </div>
        <div>
          <a href="spectator.html" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-sm font-semibold rounded-lg transition-colors">
            ← Back to Dashboard
          </a>
        </div>
      </div>

      <!-- Main Stages Display Container (Flex-1 handles scrolling, stops crop push) -->
      <div class="flex-1 p-5 grid grid-cols-2 gap-6 min-h-0 overflow-hidden pb-32">
        <!-- B1 Deep Calculation Column -->
        <div class="bg-slate-900/50 rounded-2xl border border-blue-500/20 p-4 flex flex-col min-h-0 shadow-lg relative">
          <h2 class="text-sm font-bold uppercase tracking-widest text-blue-400 border-b border-slate-700 pb-3 mb-4 flex items-center justify-between">
            <span>B1 Progression Path</span>
            <span class="text-slate-500 text-[10px]">Processing...</span>
          </h2>
          <div id="roundsContainerB1" class="flex-1 overflow-y-auto space-y-5 pr-2 custom-scrollbar"></div>
        </div>

        <!-- B2 Deep Calculation Column -->
        <div class="bg-slate-900/50 rounded-2xl border border-teal-500/20 p-4 flex flex-col min-h-0 shadow-lg relative">
          <h2 class="text-sm font-bold uppercase tracking-widest text-teal-400 border-b border-slate-700 pb-3 mb-4 flex items-center justify-between">
            <span>B2 Progression Path</span>
            <span class="text-slate-500 text-[10px]">Processing...</span>
          </h2>
          <div id="roundsContainerB2" class="flex-1 overflow-y-auto space-y-5 pr-2 custom-scrollbar"></div>
        </div>
      </div>

      <!-- FLOATING REVEAL WINNERS BUTTON -->
      <div id="revealWinnersContainer" class="fixed bottom-10 left-1/2 z-40 hidden flex-col items-center justify-center">
        <!-- Premium Cyan/Blue styling replaces the old Amber/Yellow -->
        <button onclick="showSleekWinners()" class="px-12 py-5 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white text-xl lg:text-2xl font-black tracking-widest uppercase rounded-full shadow-[0_0_50px_rgba(6,182,212,0.6)] transition-transform transform hover:scale-105 border border-cyan-300">
          Reveal Final Winners
        </button>
      </div>

    </div>
  </div>

  <!-- THE CELEBRATION POPUP (NO YELLOW) -->
  <div id="winnersPopup" class="fixed inset-0 bg-black/95 backdrop-blur-2xl hidden z-50 items-center justify-center opacity-0 transition-opacity duration-700">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
       <div class="absolute top-[10%] left-[10%] w-[50vw] h-[50vw] bg-blue-600/20 blur-[150px] rounded-full"></div>
       <div class="absolute bottom-[10%] right-[10%] w-[50vw] h-[50vw] bg-teal-600/20 blur-[150px] rounded-full"></div>
    </div>
    
    <div class="relative z-10 w-[min(95vw,1400px)] flex flex-col items-center">
      <!-- Premium White glowing text -->
      <h2 class="text-4xl lg:text-6xl font-black text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] uppercase tracking-widest mb-16 text-center">
        Elected Representatives
      </h2>
      
      <div id="winnerNamesPopup" class="flex flex-wrap justify-center gap-16 lg:gap-32 w-full px-4">
        <!-- Dynamically injected epic photo cards -->
      </div>

      <button onclick="dismissWinnersPopup()" class="mt-20 px-8 py-3 text-sm font-bold text-slate-300 uppercase tracking-widest rounded-full bg-slate-800/50 hover:bg-slate-700 transition-colors border border-slate-600/50 backdrop-blur-md">
        Close Overlay
      </button>
    </div>
  </div>

  <script src="assets/main.js"></script>
  <script>roundsInit();</script>
</body>
</html>
